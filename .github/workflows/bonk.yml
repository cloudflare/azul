name: Bonk

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: false

jobs:
  bonk:
    if: github.event.sender.type != 'Bot' && (contains(github.event.comment.body, '/bonk') || contains(github.event.comment.body, '@ask-bonk'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: rustup update stable && rustup default stable
      - name: Run Bonk
        uses: ask-bonk/ask-bonk/github@main
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          # Auto-approve tool calls in CI so Bonk doesn't stall on prompts.
          OPENCODE_CONFIG_CONTENT: '{"permission":"allow"}'
        with:
          # Workers AI reasoning model: works with the gateway creds above.
          # anthropic/* routing needs the gateway's stored Anthropic key (BYOK),
          # which expired/was rotated and now returns HTTP 401.
          model: "cloudflare-ai-gateway/workers-ai/@cf/openai/gpt-oss-120b"
          opencode_version: "1.17.7"
          mentions: "/bonk,@ask-bonk"
          permissions: CODEOWNERS
